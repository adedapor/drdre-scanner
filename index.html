<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DR DRE Fitness | Member Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: 'Lato', sans-serif; min-height: 100vh; }
    .header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid #C9A84C; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 5px; color: #C9A84C; }
    .tagline { font-size: 10px; letter-spacing: 3px; color: #666; margin-top: 4px; text-transform: uppercase; }
    .scanner-wrap { padding: 24px 20px; }
    .instruction { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 20px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border: 2px solid #C9A84C; border-radius: 4px; overflow: hidden; }
    .result-card { max-width: 400px; margin: 24px auto 0; background: #000; border-radius: 4px; overflow: hidden; display: none; }
    .result-header { padding: 16px 20px; text-align: center; }
    .result-header.active { background: #0a3d1f; border-bottom: 3px solid #00c853; }
    .result-header.expired { background: #3d0a0a; border-bottom: 3px solid #ff1744; }
    .status-icon { font-size: 48px; margin-bottom: 8px; }
    .status-text { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 3px; }
    .status-text.active { color: #00c853; }
    .status-text.expired { color: #ff1744; }
    .result-body { padding: 20px; }
    .member-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: #fff; letter-spacing: 2px; margin-bottom: 16px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; }
    .detail-label { font-size: 11px; letter-spacing: 2px; color: #C9A84C; text-transform: uppercase; }
    .detail-value { font-size: 14px; color: #fff; font-weight: 700; }
    .scan-again { display: block; width: calc(100% - 40px); margin: 16px 20px; padding: 14px; background: #C9A84C; color: #000; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 2px; cursor: pointer; }
    .loading { text-align: center; color: #C9A84C; padding: 20px; display: none; font-size: 14px; }
    .error-msg { text-align: center; color: #ff1744; padding: 20px; display: none; font-size: 14px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">DR DRE FITNESS</div>
  <div class="tagline">Member Verification</div>
</div>

<div class="scanner-wrap">
  <p class="instruction">Point the camera at the member's QR code</p>
  <div id="reader"></div>
  <div class="loading" id="loading">Checking membership...</div>
  <div class="error-msg" id="error">Member not found. Please try again.</div>

  <div class="result-card" id="resultCard">
    <div class="result-header" id="resultHeader">
      <div class="status-icon" id="statusIcon"></div>
      <div class="status-text" id="statusText"></div>
    </div>
    <div class="result-body">
      <div class="member-name" id="memberName"></div>
      <div class="detail-row">
        <span class="detail-label">Plan</span>
        <span class="detail-value" id="memberPlan"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Start Date</span>
        <span class="detail-value" id="memberStart"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Expiry Date</span>
        <span class="detail-value" id="memberExpiry"></span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Phone</span>
        <span class="detail-value" id="memberPhone"></span>
      </div>
    </div>
    <button class="scan-again" onclick="scanAgain()">Scan Another Member</button>
  </div>
</div>

<script>
  const AIRTABLE_TOKEN = 'patARE57acwqgZj8Q';
  const BASE_ID = 'appoXIVdfph2uh4Om';
  const TABLE_NAME = 'Table 1';

  let html5QrCode;

  function startScanner() {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      onScanSuccess
    );
  }

  async function onScanSuccess(recordId) {
    await html5QrCode.stop();
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    document.getElementById('resultCard').style.display = 'none';

    try {
      const response = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${recordId}`,
        { headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}` } }
      );

      if (!response.ok) {
  console.log('Status:', response.status);
  console.log('Response:', await response.text());
  throw new Error('Not found');
}

      const data = await response.json();
      const fields = data.fields;

      document.getElementById('loading').style.display = 'none';

      const isActive = fields['Status'] === 'Active';
      const header = document.getElementById('resultHeader');
      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');

      header.className = `result-header ${isActive ? 'active' : 'expired'}`;
      statusIcon.textContent = isActive ? '✅' : '❌';
      statusText.textContent = isActive ? 'ACTIVE' : 'EXPIRED';
      statusText.className = `status-text ${isActive ? 'active' : 'expired'}`;

      document.getElementById('memberName').textContent = fields['Full Name'] || 'N/A';
      document.getElementById('memberPlan').textContent = fields['Subscription'] || 'N/A';
      document.getElementById('memberStart').textContent = fields['Start Date'] || 'N/A';
      document.getElementById('memberExpiry').textContent = fields['End Date'] || 'N/A';
      document.getElementById('memberPhone').textContent = fields['Phone Number'] || 'N/A';

      document.getElementById('resultCard').style.display = 'block';

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      setTimeout(scanAgain, 3000);
    }
  }

  function scanAgain() {
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    startScanner();
  }

  startScanner();
</script>

</body>
</html>
